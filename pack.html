<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compliance pack — Solarsearch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F7F9F6;--panel:#fff;--tint2:#F0F5F1;--ink:#0F2E27;--ink2:#41615A;--ink3:#6D8781;--line:#DBE5DE;--line2:#C4D5CA;--amber:#FFB100;--amberd:#DE8F00;--safe:#177A53;--safes:#E2F2EA;--amber-soft:#FFF3D6;--red:#C2452D;--red-soft:#FBEAE6;--display:'Bricolage Grotesque',sans-serif;--body:'Instrument Sans',sans-serif;--mono:'Spline Sans Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:var(--mono)}
.wrap{max-width:820px;margin:0 auto;padding:24px 22px 60px}
.bar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
.logo{font-family:var(--display);font-weight:800;font-size:1.15rem}.logo em{font-style:normal;color:var(--amber)}
.btn{border:none;border-radius:999px;background:var(--ink);color:#fff;font-weight:700;font-size:.85rem;padding:10px 20px;cursor:pointer}
.head{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:20px 22px;margin-bottom:16px}
.head h1{font-family:var(--display);font-size:1.5rem}
.head .ref{font-family:var(--mono);font-size:.7rem;color:var(--amberd);font-weight:700;letter-spacing:.06em}
.badge{display:inline-block;font-family:var(--mono);font-size:.62rem;font-weight:700;letter-spacing:.05em;padding:5px 11px;border-radius:99px;margin-top:8px}
.badge.signed{background:var(--safes);color:var(--safe)}.badge.unsigned{background:var(--amber-soft);color:#7A5A00}
.sec{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:18px 22px;margin-bottom:14px;break-inside:avoid}
.sec h2{font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:12px}
.row{display:flex;justify-content:space-between;gap:14px;padding:7px 0;border-top:1px solid var(--line);font-size:.9rem}
.row:first-of-type{border-top:none}.row span{color:var(--ink2)}.row b{font-family:var(--mono);text-align:right}
.row.big b{font-size:1.15rem}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);padding:6px 8px;border-bottom:1px solid var(--line)}
td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
.v-pass{color:var(--safe);font-weight:700}.v-fail,.v-major{color:var(--red);font-weight:700}.v-minor{color:var(--amberd);font-weight:700}
.foot{font-family:var(--mono);font-size:.62rem;color:var(--ink3);letter-spacing:.04em;text-align:center;margin-top:22px}
.msg{padding:60px 0;text-align:center;color:var(--ink2)}
@media print{
  body{background:#fff}.btn{display:none}.wrap{max-width:none;padding:0}
  .sec,.head{border-color:#ccc;box-shadow:none}
}
</style>
</head>
<body>
<div class="wrap" id="wrap"><div class="msg">Loading compliance pack…</div></div>

<script type="module">
import { SUPABASE_URL, SUPABASE_ANON_KEY } from "/src/lib/supabase.js";
const fmt$=c=>'$'+Math.round((c||0)/100).toLocaleString();
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const dt=s=>s?new Date(s).toLocaleString('en-AU',{day:'numeric',month:'short',year:'numeric',hour:'numeric',minute:'2-digit'}):'—';
const d=s=>s?new Date(s).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}):'—';
const TOKEN=new URLSearchParams(location.search).get('token');
const EVLABEL={'assessment.booked':'Site visit booked','assessment.submitted':'Site assessment completed','inspection.completed':'Inspection completed','design.completed':'System designed','board.opened':'Quotes opened to installers','customer.chose':'Customer chose installer','proposal.signed':'Agreement signed','post_sale.advanced':'Stage advanced'};

async function load(){
  if(!TOKEN){ document.getElementById('wrap').innerHTML='<div class="msg">This pack link is missing its access code.</div>'; return; }
  let p;
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/rpc/compliance_pack',{method:'POST',
      headers:{apikey:SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({p_token:TOKEN})});
    if(!res.ok) throw new Error('HTTP '+res.status);
    p=await res.json();
  }catch(e){ document.getElementById('wrap').innerHTML='<div class="msg">Could not load this pack. The link may be invalid.</div>'; return; }
  if(p.error){ document.getElementById('wrap').innerHTML='<div class="msg">This pack link isn\'t valid.</div>'; return; }
  render(p);
}

function verdictClass(v){ v=(v||'').toLowerCase(); return v==='pass'?'v-pass':v==='fail'?'v-fail':v==='major'?'v-major':v==='minor'?'v-minor':''; }

function render(p){
  const inst=p.installer||{}, ag=p.agreement||{}, lo=p.lodgement||{};
  const sys=`${p.system_kw?Number(p.system_kw)+' kW':''}${p.system_kw&&p.battery_kwh?' + ':''}${p.battery_kwh?Number(p.battery_kwh)+' kWh':''}`||'—';
  const ev=(p.evidence||[]);
  const tl=(p.timeline||[]);
  document.getElementById('wrap').innerHTML=`
  <div class="bar"><span class="logo">solar<em>search</em></span><button class="btn" onclick="window.print()">Print / Save PDF</button></div>
  <div class="head">
    <div class="ref">${esc(p.ss_ref||'')} · COMPLIANCE &amp; VERIFICATION PACK</div>
    <h1>${esc(p.address||'')}</h1>
    <div style="color:var(--ink2);margin-top:4px">${esc(p.customer_name||'')}</div>
    <span class="badge ${ag.signed?'signed':'unsigned'}">${ag.signed?'AGREEMENT SIGNED':'NOT YET SIGNED'}</span>
  </div>

  <div class="sec"><h2>System &amp; installer</h2>
    <div class="row"><span>Installer</span><b>${esc(inst.company||'—')}</b></div>
    <div class="row"><span>System</span><b>${sys}</b></div>
    <div class="row"><span>Panels</span><b>${esc(inst.panel||'—')}</b></div>
    <div class="row"><span>Inverter</span><b>${esc(inst.inverter||'—')}</b></div>
    <div class="row"><span>Battery</span><b>${esc(inst.battery||'—')}</b></div>
    <div class="row"><span>Workmanship warranty</span><b>${inst.warranty_years||10} yrs</b></div>
    <div class="row"><span>Price before rebates</span><b>${fmt$(inst.price_before_cents)}</b></div>
    <div class="row"><span>Federal rebates (${inst.stc_count||0} STCs)</span><b>– ${fmt$(inst.rebate_cents)}</b></div>
    <div class="row big"><span>Price payable</span><b>${fmt$(inst.price_after_cents)}</b></div>
  </div>

  <div class="sec"><h2>Agreement</h2>
    <div class="row"><span>Status</span><b>${ag.signed?'Signed':'Pending signature'}</b></div>
    <div class="row"><span>Signed by</span><b>${esc(ag.signed_name||'—')}</b></div>
    <div class="row"><span>Signed at</span><b>${dt(ag.signed_at)}</b></div>
    <div class="row"><span>Capture (IP)</span><b>${esc(ag.signed_ip||'—')}</b></div>
    <div class="row"><span>Rules version</span><b>${esc(p.rules_version||'—')}</b></div>
  </div>

  <div class="sec"><h2>Grid connection &amp; DER lodgement</h2>
    <div class="row"><span>DNSP connection</span><b>${esc(lo.connection_status||'—')}</b></div>
    <div class="row"><span>Approval reference</span><b>${esc(lo.connection_reference||'—')}</b></div>
    <div class="row"><span>Approved export limit</span><b>${lo.export_limit_kw?lo.export_limit_kw+' kW':'—'}</b></div>
    <div class="row"><span>DER Register</span><b>${lo.der_registered_at?'Registered '+d(lo.der_registered_at):'Not yet registered'}</b></div>
  </div>

  <div class="sec"><h2>Site evidence — ${ev.length} item${ev.length===1?'':'s'}</h2>
    ${ev.length?`<table><thead><tr><th>Source</th><th>Checkpoint</th><th>Result</th><th>Note</th><th>Captured</th></tr></thead><tbody>
      ${ev.map(e=>`<tr><td>${esc(e.source)}</td><td>${esc((e.step||'').replace(/_/g,' '))}</td>
        <td class="${verdictClass(e.verdict)}">${esc(e.na?'N/A':(e.verdict||'—')).toUpperCase()}</td>
        <td>${esc(e.note||e.na||'')}</td><td class="mono" style="font-size:.72rem">${dt(e.taken_at)}${e.gps?' · GPS':''}</td></tr>`).join('')}
    </tbody></table>`:'<div style="color:var(--ink3)">No captured evidence on this job yet.</div>'}
    <div style="font-size:.72rem;color:var(--ink3);margin-top:8px">Each item is geotagged and time-stamped; original images are held in the locked job record.</div>
  </div>

  <div class="sec"><h2>Milestone timeline</h2>
    ${tl.length?tl.map(t=>`<div class="row"><span>${esc(EVLABEL[t.event]||t.event)}${t.event==='post_sale.advanced'&&t.payload&&t.payload.to?' — '+esc(String(t.payload.to).replace(/_/g,' ')):''}</span><b class="mono" style="font-size:.72rem">${dt(t.at)}</b></div>`).join(''):'<div style="color:var(--ink3)">No milestones recorded yet.</div>'}
  </div>

  <div class="foot">GENERATED ${dt(p.generated_at)} · SOLARSEARCH.COM.AU · A ME-SOLAR BRAND · ABN 95665045465<br>SOLARSEARCH ACTS AS FACILITATOR &amp; AUTHORISED AGENT — YOUR AGREEMENT &amp; WARRANTIES ARE WITH THE INSTALLER</div>`;
}
load();
</script>
</body>
</html>
